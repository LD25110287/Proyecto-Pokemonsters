name: Build PokemonGame

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make

      - name: Descargar SFML 2.6.2 (binarios oficiales para MinGW)
        run: |
          curl -L -f -o sfml.zip "https://sourceforge.net/projects/sfml.mirror/files/2.6.2/SFML-2.6.2-windows-gcc-13.1.0-mingw-64-bit.zip/download"
          file sfml.zip
          tar -xf sfml.zip
          mv SFML-2.6.2 SFML

      - name: Configurar proyecto (CMake)
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DSFML_DIR="$(pwd)/SFML/lib/cmake/SFML"

      - name: Compilar proyecto
        run: |
          cmake --build build --config Release

      - name: Copiar DLLs de SFML junto al ejecutable
        run: |
          cp SFML/bin/*.dll build/

      - name: Subir ejecutable como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pokemonster-windows
          path: |
            build/pokemonster.exe
            build/assets
          if-no-files-found: warn
